server:
  bind: "0.0.0.0:8080"

metrics:
  enabled: true
  bind: "0.0.0.0:9090"

batcher:
  max_size: 5000
  flush_period: 1s
  buffer_size: 100000

sinks:
  postgres:
    enabled: true
    dsn: "postgres://polygate:polygate@localhost:5432/polygate"
    bulk_size: 5000
    max_conns: 10

  mongodb:
    enabled: true
    dsn: "mongodb://localhost:27017/polygate"
    bulk_size: 5000
