services:
  polygate:
    build: .
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:9090:9090"
    volumes:
      - ./config.docker.pg-es.yaml:/etc/polygate/config.yaml:ro
    depends_on:
      - postgres
      - elasticsearch
    restart: unless-stopped

  postgres:
    image: postgres:17
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: polygate
      POSTGRES_USER: polygate
      POSTGRES_PASSWORD: polygate
    volumes:
      - pg_data:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    ports:
      - "127.0.0.1:9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data

volumes:
  pg_data:
  es_data:
