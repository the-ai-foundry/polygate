server:
  bind: "0.0.0.0:8080"

metrics:
  enabled: true
  bind: "0.0.0.0:9090"

batcher:
  max_size: 5000
  flush_period: 1s
  buffer_size: 100000

sinks:
  mongodb:
    enabled: true
    dsn: "mongodb://mongodb:27017/polygate"
    bulk_size: 5000

  elasticsearch:
    enabled: true
    dsn: "http://elasticsearch:9200"
    bulk_size: 5000
