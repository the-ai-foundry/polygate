server:
  bind: "0.0.0.0:8080"

metrics:
  enabled: true
  bind: "0.0.0.0:9090"

batcher:
  max_size: 5000
  flush_period: 1s
  buffer_size: 100000

sinks:
  postgres:
    enabled: true
    dsn: "postgres://polygate:polygate@localhost:5432/polygate"
    bulk_size: 5000
    max_conns: 10
    max_retries: 3
    retry_base_ms: 100
    timeout_secs: 30

  clickhouse:
    enabled: true
    dsn: "http://localhost:8123"
    bulk_size: 10000
    max_retries: 3
    retry_base_ms: 100
    timeout_secs: 30

  elasticsearch:
    enabled: true
    dsn: "http://localhost:9200"
    bulk_size: 5000
    max_retries: 3
    retry_base_ms: 100
    timeout_secs: 30

  mongodb:
    enabled: true
    dsn: "mongodb://localhost:27017/polygate"
    bulk_size: 5000
    max_retries: 3
    retry_base_ms: 100

  questdb:
    enabled: true
    dsn: "localhost:9009"
    bulk_size: 10000
    max_retries: 3
    retry_base_ms: 100
    timeout_secs: 30

# Trino federated query engine (optional)
# Enables cross-database JOINs: SELECT * FROM postgres.polygate.orders o JOIN clickhouse.default.metrics m ON ...
trino:
  enabled: true
  url: "http://localhost:8085"
